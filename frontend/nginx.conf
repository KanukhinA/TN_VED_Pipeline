server {
  listen 80;
  server_name localhost;

  # По умолчанию у nginx 1m — мало для /api/feature-extraction/few-shot-assist с сотнями/тысячами текстов из xlsx.
  client_max_body_size 128m;

  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }

  # NDJSON-стрим few-shot: без буферизации, иначе прогресс не доходит до браузера по частям
  location ~ ^/api/feature-extraction/few-shot-assist/stream$ {
    proxy_pass http://api-gateway:8000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_buffering off;
    proxy_request_buffering off;
    proxy_connect_timeout 900s;
    proxy_send_timeout 900s;
    proxy_read_timeout 900s;
  }

  # NDJSON-стрим валидации инспектора: без буферизации, иначе этапы/partial приходят только в конце.
  location ~ ^/api/validate/stream$ {
    proxy_pass http://api-gateway:8000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_buffering off;
    proxy_request_buffering off;
    proxy_connect_timeout 900s;
    proxy_send_timeout 900s;
    proxy_read_timeout 900s;
  }

  location /api/ {
    proxy_pass http://api-gateway:8000/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # deploy / pull моделей идут долго; иначе nginx отдаёт 504 при дефолтных ~60s
    proxy_connect_timeout 900s;
    proxy_send_timeout 900s;
    proxy_read_timeout 900s;
  }
}
